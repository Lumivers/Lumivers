name: GitHub-Profile-Summary-Cards

on:
  schedule: # 每天自动更新
    - cron: "0 0 * * *"
  workflow_dispatch: # 允许你手动点击运行
  push:
    branches:
      - main # 当你改了 README 提交时也触发一次

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3 # 建议用 v3，更稳定
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # 确保这个名字和你 Settings 里的 Secret 名字完全一致
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARD_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
